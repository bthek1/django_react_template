services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8004
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8004:8004"
    depends_on:
      - db
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://appuser:apppassword@db:5432/appdb

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      VITE_API_BASE_URL: http://localhost:8004

volumes:
  postgres_data:
  backend_venv:
